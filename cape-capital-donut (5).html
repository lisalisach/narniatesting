<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cape Capital – The Engine</title>
<style>
  @font-face {
    font-family: 'PP Eiko';
    src: url('pp-eiko-light.woff2') format('woff2');
    font-weight: 300;
    font-style: normal;
  }
  @font-face {
    font-family: 'PP Eiko';
    src: url('pp-eiko-light-italic.woff2') format('woff2');
    font-weight: 300;
    font-style: italic;
  }
  @font-face {
    font-family: 'F37 Hooj';
    src: url('f37-hooj.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
  }

  #cape-engine-widget {
    box-sizing: border-box;
    background: #FAFBFE;
    font-family: Arial, Helvetica, sans-serif;
    color: #4C4F56;
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 56px;
  }
  #cape-engine-widget *, #cape-engine-widget *::before, #cape-engine-widget *::after {
    box-sizing: border-box;
  }
  #cape-engine-widget .cc-body {
    display: flex;
    align-items: center;
    gap: 40px;
  }
  #cape-engine-widget .cc-legend {
    flex: 0 0 340px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
    align-content: start;
  }
  #cape-engine-widget .cc-legend-group {
    margin-bottom: 20px;
    transition: opacity 200ms ease;
  }
  #cape-engine-widget .cc-legend-group.dimmed { opacity: 0.25; }
  #cape-engine-widget .cc-legend-group-title {
    font-family: 'F37 Hooj', Arial, sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #ADB2BA;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #EEF0F4;
    transition: color 200ms ease;
  }
  #cape-engine-widget .cc-legend-group.active .cc-legend-group-title { color: #831011; }
  #cape-engine-widget .cc-legend-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
  }
  #cape-engine-widget .cc-legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex: 0 0 8px;
    margin-top: 3px;
    background: #831011;
  }
  #cape-engine-widget .cc-legend-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11.5px;
    color: #4C4F56;
    line-height: 1.4;
  }
  #cape-engine-widget .cc-chart-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<div id="cape-engine-widget">
  <div class="cc-body">
    <div class="cc-legend" id="cc-legend"></div>
    <div class="cc-chart-wrap">
      <canvas id="cc-donut-chart" width="380" height="380" style="cursor:default;display:block;"></canvas>
    </div>
  </div>
</div>

<script>
(function () {

  function init() {
    const SEGMENTS = [
      { key: 'Internal',             color: '#9B1415' },
      { key: 'External',             color: '#AD2A2B' },
      { key: 'Narnia / Inside Cape', color: '#C04041' },
      { key: 'Backend',              color: '#831011' },
    ];

    const GROUP_DEFS = [
      {
        title: 'Backend',
        items: ['Claude Code / Codex', 'VS Code / GitHub', 'Microsoft Azure']
      },
      {
        title: 'Internal',
        items: ['Dashboard (Monitoring, Reporting, Managing)', 'Dynamic file management system', 'Research']
      },
      {
        title: 'External',
        items: ['Iran conflict gauge', 'Mid-terms', 'Cybersecurity risk', 'Others?']
      },
      {
        title: 'Narnia / Inside Cape',
        items: ['Web-based Cape universe', 'Password protected for clients', 'Released later this year']
      },
    ];

    /* ── Build legend ── */
    const legendEl = document.getElementById('cc-legend');
    const groupEls = {};

    GROUP_DEFS.forEach(group => {
      const div = document.createElement('div');
      div.className = 'cc-legend-group';
      groupEls[group.title] = div;

      const titleEl = document.createElement('div');
      titleEl.className = 'cc-legend-group-title';
      titleEl.textContent = group.title;
      div.appendChild(titleEl);

      group.items.forEach(label => {
        const row = document.createElement('div');
        row.className = 'cc-legend-item';
        const dot = document.createElement('span');
        dot.className = 'cc-legend-dot';
        const lbl = document.createElement('span');
        lbl.className = 'cc-legend-label';
        lbl.textContent = label;
        row.appendChild(dot);
        row.appendChild(lbl);
        div.appendChild(row);
      });

      legendEl.appendChild(div);
    });

    function highlightGroup(key) {
      Object.entries(groupEls).forEach(([name, el]) => {
        if (!key) {
          el.classList.remove('active', 'dimmed');
        } else if (name === key) {
          el.classList.add('active');
          el.classList.remove('dimmed');
        } else {
          el.classList.add('dimmed');
          el.classList.remove('active');
        }
      });
    }

    function darken(hex, amt) {
      let r = parseInt(hex.slice(1,3),16);
      let g = parseInt(hex.slice(3,5),16);
      let b = parseInt(hex.slice(5,7),16);
      return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
    }

    const canvas = document.getElementById('cc-donut-chart');

    /* ── Center text drawn directly onto canvas — NOT a registered plugin ── */
    const centerTextPlugin = {
      id: 'capeEngineCenterText_' + Date.now(), /* unique ID per instance */
      afterDraw(chart) {
        /* Only run on our specific canvas, ignore all others */
        if (chart.canvas !== canvas) return;
        const { ctx, chartArea: { left, right, top, bottom } } = chart;
        const cx = (left + right) / 2;
        const cy = (top + bottom) / 2;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ['CORE', 'AI CAPE', 'ENGINE'].forEach((line, idx) => {
          ctx.font = '600 10.5px Arial';
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillText(line, cx, cy - 14 + idx * 14);
        });
        ctx.restore();
      }
    };

    /* Create a fresh Chart instance — never calling Chart.register() */
    const ChartJS = window.Chart;

    new ChartJS(canvas, {
      type: 'doughnut',
      data: {
        datasets: [
          {
            data: SEGMENTS.map(() => 25),
            backgroundColor: SEGMENTS.map(d => d.color),
            hoverBackgroundColor: SEGMENTS.map(d => darken(d.color, 25)),
            borderWidth: 4,
            borderColor: '#FAFBFE',
            hoverBorderColor: '#FAFBFE',
            hoverOffset: 10,
            weight: 3,
          },
          {
            data: [100],
            backgroundColor: ['#5c0b0b'],
            borderWidth: 0,
            hoverBackgroundColor: ['#5c0b0b'],
            hoverOffset: 0,
            weight: 1.6,
          },
        ],
      },
      options: {
        cutout: '0%',
        responsive: false,
        maintainAspectRatio: false,
        layout: { padding: 20 },
        onHover(evt, activeEls) {
          const outer = activeEls.find(e => e.datasetIndex === 0);
          if (outer) {
            canvas.style.cursor = 'pointer';
            highlightGroup(SEGMENTS[outer.index].key);
          } else {
            canvas.style.cursor = 'default';
            highlightGroup(null);
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            filter: item => item.datasetIndex === 0,
            displayColors: false,
            backgroundColor: '#831011',
            titleColor: '#fff',
            bodyColor: 'rgba(255,255,255,0.75)',
            titleFont: { family: 'Arial', weight: '600', size: 12 },
            bodyFont: { family: 'Arial', size: 11 },
            padding: 10,
            callbacks: {
              title(items) { return SEGMENTS[items[0].dataIndex].key; },
              label(item) {
                const g = GROUP_DEFS.find(g => g.title === SEGMENTS[item.dataIndex].key);
                return g ? g.items : [];
              },
            },
          },
        },
      },
      /* Plugin passed locally — never touches Chart.registry or Chart.defaults */
      plugins: [centerTextPlugin]
    });

    canvas.addEventListener('mouseleave', () => highlightGroup(null));
  }

  if (window.Chart) {
    init();
  } else {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    s.onload = init;
    document.head.appendChild(s);
  }

})();
</script>
</body>
</html>
